<div class="radio-player">
  @if ({ state: playerState$ | async }; as ctx) {
  <button title="Sintonizar / Pausar" (click)="togglePlay()" class="play-btn" [disabled]="ctx.state === 'loading'"
    [attr.aria-label]="ctx.state === 'playing' ? 'Pausar' : 'Sintonizar'">
    @if (ctx.state === 'playing') {
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <rect x="6" y="4" width="4" height="16"></rect>
      <rect x="14" y="4" width="4" height="16"></rect>
    </svg>
    } @else if (ctx.state === 'loading') {
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round" class="spinner">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity="0.25"></circle>
      <path d="M12 2a10 10 0 0 1 10 10"></path>
    </svg>
    } @else {
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="5 3 19 12 5 21"></polygon>
    </svg>
    }
  </button>
  }

  @if (metadataParts$ | async; as meta) {
  <div class="metadata-desktop">
    <span class="metadata__text">
      @if (meta.isSplit) {
      <span class="artist">{{ meta.artist }}</span>
      <span class="divider"> - </span>
      }
      <span class="title">{{ meta.title }}</span>
    </span>
  </div>

  <div class="metadata-mobile">
    <div class="metadata-mobile__track">
      <span class="metadata__text">
        @if (meta.isSplit) {
        <span class="artist">{{ meta.artist }}</span>
        <span class="divider"> - </span>
        }
        <span class="title">{{ meta.title }}</span>
      </span>
      <span class="metadata__text" aria-hidden="true">
        @if (meta.isSplit) {
        <span class="artist">{{ meta.artist }}</span>
        <span class="divider"> - </span>
        }
        <span class="title">{{ meta.title }}</span>
      </span>
    </div>
  </div>
  }

  <div class="volume-control" [class.is-expanded]="showVolumeSlider">
    <button class="volume-btn" (click)="onVolumeButtonClick()"
      [attr.aria-label]="volume === 0 ? 'Activar sonido' : 'Silenciar'">
      @if (volume === 0) {
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      </svg>
      } @else if (volume < 0.5) { <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
        }
    </button>
    <label for="volume">Volumen</label>
    <input id="volume" type="range" min="0" max="1" step="0.01" [value]="volume" (input)="changeVolume($event)" />
  </div>
</div>
