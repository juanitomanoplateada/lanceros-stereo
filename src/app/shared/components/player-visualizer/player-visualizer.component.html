<section id="live" class="live-player" aria-labelledby="live-player-heading">
  <div class="live-player__container">
    <header class="live-player__header">
      <h2 id="live-player-heading" class="live-player__title">
        <svg class="live-player__title-icon" [ngClass]="{ 'is-playing': (playerState$ | async) === 'playing' }" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/>
          <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/>
          <circle cx="12" cy="12" r="2"/>
          <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/>
          <path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"/>
        </svg>
        <span>Sintonízanos en Vivo</span>
      </h2>
      <p class="live-player__subtitle">
        Escucha nuestra transmisión en directo
      </p>
    </header>

    <div class="live-player__visual">
      <img class="live-player__image" src="LS94_1.png" alt="Transmisión en vivo de Lanceros Stereo 94.1 FM"
        [ngClass]="{ 'is-playing': (playerState$ | async) === 'playing' }" />

      @if ((playerState$ | async) === 'playing') {
        <div class="live-player__waves">
          <span></span><span></span><span></span><span></span>
        </div>
      }
    </div>
  </div>
</section>
